name: Cpp devcontainer
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Build container with tag ({0}{1})', (inputs.image_tag == '' && github.sha || inputs.image_tag), (inputs.tag_has_latest == true && ', latest' || '' )) || ''}}

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "The tag version for the dev container image."
        required: false
        type: string
        default: ""
      tag_has_latest:
        description: "Tag the container image as latest."
        required: true
        type: boolean
        default: false
      no_cache:
        description: "Disable the image cache from when building."
        required: true
        type: boolean
        default: false
      skip_build:
        description: "Skip build, only tag the existing image for this commit."
        required: true
        type: boolean
        default: false
  push:
    branches:
      - dev
      - main
    paths:
      - 'src/cpp/**'
      - '.github/workflows/cicd-cpp.yml'

permissions:
  packages: write

env:
  devContainer_suffix: "-devcontainer"
  devContainer_name: "cpp-linux"
  devContainer_folder: "src/cpp-linux"
  devContainer_image_tag: ${{ inputs.image_tag == '' && github.sha || inputs.image_tag }}${{ inputs.tag_has_latest && ', latest' || '' }}

jobs:
  build-and-push:
    name: Create/Update the devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Lowercase Variables
      #   run: |
      #     echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER@L}" >> $GITHUB_ENV
      #     echo "DEVCONTAINER_PATH=${GITHUB_REPOSITORY@L}-devcontainer" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_build) }}
        uses: devcontainers/ci@v0.3
        with:
          subFolder: ${{env.devContainer_folder}}
          noCache: ${{ github.event_name == 'workflow_dispatch' && inputs.no_cache || false }}
          imageName: ghcr.io/${{ github.repository_owner }}/${{env.devContainer_name}}${{env.devContainer_suffix}}
          cacheFrom: type=gha
          cacheTo: type=gha,mode=max
          imageTag: ${{env.devContainer_image_tag}}
          push: always

      - name: Tag existing image
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_build }}
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{env.devContainer_name}}${{env.devContainer_suffix}}"
          docker pull $IMAGE_NAME:${{ github.sha }}
          IFS=',' read -ra TAGS <<< "${{env.devContainer_image_tag}}"
          for tag in "${TAGS[@]}"; do
            tag=$(echo $tag | xargs)
            if [ -n "$tag" ] && [ "$tag" != "${{ github.sha }}" ]; then
              docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:$tag
              docker push $IMAGE_NAME:$tag
            fi
          done
